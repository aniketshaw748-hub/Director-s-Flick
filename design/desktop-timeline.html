<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Timeline — Director's Flick</title>
<style>
/* ============ TOKENS ============ */
:root{
  --bg-0:#0A0A0B; --bg-1:#0E0E10; --surface-1:#141416; --surface-2:#1A1A1D; --surface-3:#212125;
  --overlay:rgba(6,6,8,.72);
  --border-1:rgba(255,255,255,.07); --border-2:rgba(255,255,255,.12); --border-3:rgba(255,255,255,.18);
  --text-1:#F2F3EE; --text-2:#A5A8A0; --text-3:#6E716A; --text-disabled:#494B44;
  --lime:#C6FF4D; --lime-bright:#D7FF7B; --lime-deep:#A8E635; --lime-ink:#121600;
  --lime-a08:rgba(198,255,77,.08); --lime-a12:rgba(198,255,77,.12); --lime-a20:rgba(198,255,77,.20); --lime-a35:rgba(198,255,77,.35);
  --danger:#FF5C5C; --danger-a12:rgba(255,92,92,.12); --danger-a35:rgba(255,92,92,.35);
  --warn:#FFB454; --warn-a12:rgba(255,180,84,.12); --info:#8AB8F0;
  --font-sans:"Inter","Geist","Segoe UI Variable Display","Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
  --font-mono:"Geist Mono","JetBrains Mono","Cascadia Code","SF Mono",Consolas,"Roboto Mono",monospace;
  --fs-11:11px; --fs-12:12px; --fs-13:13px; --fs-14:14px; --fs-16:16px; --fs-18:18px; --fs-22:22px; --fs-28:28px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px; --sp-10:40px; --sp-12:48px;
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:20px; --r-2xl:24px; --r-full:999px;
  --shadow-1:0 1px 2px rgba(0,0,0,.4); --shadow-2:0 8px 24px rgba(0,0,0,.45); --shadow-3:0 24px 64px rgba(0,0,0,.6);
  --glow-lime:0 0 0 1px var(--lime-a20),0 0 24px rgba(198,255,77,.15);
  --glow-lime-strong:0 0 0 1px var(--lime-a35),0 0 40px rgba(198,255,77,.25);
  --t-fast:150ms; --t-med:200ms; --t-slow:250ms;
  --ease:cubic-bezier(.2,0,0,1); --ease-out:cubic-bezier(.16,1,.3,1);
  --wave:rgba(255,255,255,.26); --focus-ring:0 0 0 2px var(--bg-0),0 0 0 4px var(--lime-a35);
}

/* ============ BASE & CHROME ============ */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg-0);color:var(--text-1);font:400 var(--fs-14)/1.5 var(--font-sans);-webkit-font-smoothing:antialiased;min-width:1280px}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
button:focus-visible{outline:none;box-shadow:var(--focus-ring)}
.mono{font-family:var(--font-mono)}
svg{display:block}

.app{display:flex;height:100vh}
.rail{width:64px;flex:none;background:var(--bg-1);border-right:1px solid var(--border-1);display:flex;flex-direction:column;align-items:center;padding:var(--sp-4) 0;gap:var(--sp-2);position:relative;z-index:20}
.logo{width:32px;height:32px;border-radius:10px;background:var(--lime);display:grid;place-items:center;margin-bottom:var(--sp-5);box-shadow:var(--glow-lime)}
.nav-btn{width:40px;height:40px;border-radius:var(--r-md);display:grid;place-items:center;color:var(--text-3);position:relative;transition:background var(--t-fast) var(--ease),color var(--t-fast) var(--ease)}
.nav-btn:hover{color:var(--text-1);background:var(--surface-2)}
.nav-btn.active{color:var(--lime);background:var(--lime-a08)}
.nav-btn.active::before{content:"";position:absolute;left:-12px;top:10px;bottom:10px;width:2px;border-radius:2px;background:var(--lime);box-shadow:0 0 8px var(--lime-a35)}
.rail-spacer{flex:1}
.avatar{width:28px;height:28px;border-radius:var(--r-full);background:var(--surface-3);border:1px solid var(--border-2);display:grid;place-items:center;font-size:var(--fs-11);font-weight:600;color:var(--text-2)}

.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100%}
.topbar{height:60px;flex:none;display:flex;align-items:center;gap:var(--sp-4);padding:0 var(--sp-8);border-bottom:1px solid var(--border-1);background:var(--bg-1)}
.proj{display:flex;align-items:baseline;gap:var(--sp-3)}
.proj-name{font-weight:600}
.proj-meta{color:var(--text-3);font-size:var(--fs-12)}
.top-spacer{flex:1}
.account-chip{display:flex;align-items:center;gap:var(--sp-2);height:36px;padding:0 var(--sp-3);border-radius:var(--r-full);background:var(--surface-1);border:1px solid var(--border-1)}
.account-chip .initial{width:22px;height:22px;border-radius:var(--r-full);background:var(--lime-a12);border:1px solid var(--lime-a20);color:var(--lime);display:grid;place-items:center;font-size:10px;font-weight:700}
.account-chip .name{font-size:var(--fs-13);font-weight:500}
.account-chip .cr{font-family:var(--font-mono);font-size:var(--fs-12);color:var(--lime)}
.conn{display:flex;align-items:center;gap:var(--sp-2);height:36px;padding:0 var(--sp-3);border-radius:var(--r-full);border:1px solid var(--border-1);color:var(--text-2);font-size:var(--fs-12)}
.dot{width:7px;height:7px;border-radius:var(--r-full);background:var(--lime);box-shadow:0 0 8px var(--lime-a35)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:40px;padding:0 var(--sp-4);border-radius:var(--r-md);font-weight:500;font-size:var(--fs-14);transition:all var(--t-fast) var(--ease)}
.btn-primary{background:var(--lime);color:var(--lime-ink);font-weight:600}
.btn-primary:hover{background:var(--lime-bright);box-shadow:var(--glow-lime-strong)}
.btn-secondary{background:var(--surface-2);border:1px solid var(--border-1)}
.btn-secondary:hover{background:var(--surface-3);border-color:var(--border-2)}

/* ============ TIMELINE LAYOUT ============ */
.workspace{flex:1;display:flex;flex-direction:column;overflow:hidden}
.preview-area{flex:1;display:flex;gap:var(--sp-6);padding:var(--sp-6);min-height:0}

/* Player */
.player-container{flex:1;background:var(--bg-1);border-radius:var(--r-lg);border:1px solid var(--border-1);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-2)}
.player-vid{flex:1;background:#000;display:flex;align-items:center;justify-content:center;position:relative}
.player-vid img{width:100%;height:100%;object-fit:contain}
.player-controls{height:48px;background:var(--surface-1);border-top:1px solid var(--border-1);display:flex;align-items:center;padding:0 var(--sp-4);gap:var(--sp-4)}
.play-btn{width:32px;height:32px;border-radius:var(--r-full);background:var(--lime);color:var(--lime-ink);display:grid;place-items:center}
.timecode{font-family:var(--font-mono);font-size:var(--fs-12);color:var(--text-2)}

/* Export Panel */
.export-panel{width:340px;flex:none;background:var(--surface-1);border-radius:var(--r-lg);border:1px solid var(--border-1);padding:var(--sp-5);display:flex;flex-direction:column;gap:var(--sp-4)}
.export-panel .overline{font-size:var(--fs-11);font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:var(--sp-2)}
.stats-row{display:flex;justify-content:space-between;font-size:var(--fs-13);color:var(--text-2);padding:4px 0}
.stats-row .v{font-family:var(--font-mono);color:var(--text-1)}
.progress-container{margin-top:auto;padding-top:var(--sp-4);border-top:1px solid var(--border-1)}
.progress-bar{height:6px;border-radius:3px;background:var(--surface-3);overflow:hidden;margin-bottom:var(--sp-2)}
.progress-fill{height:100%;background:var(--lime);width:45%;box-shadow:0 0 8px var(--lime-a35)}

/* Timeline strip */
.timeline-area{height:260px;flex:none;background:var(--surface-1);border-top:1px solid var(--border-1);display:flex;flex-direction:column}
.tl-tools{height:44px;border-bottom:1px solid var(--border-1);display:flex;align-items:center;padding:0 var(--sp-4);gap:var(--sp-4)}
.tl-track{flex:1;position:relative;overflow-x:auto;overflow-y:hidden;background:var(--bg-1);display:flex;flex-direction:column}
.tl-ruler{height:24px;border-bottom:1px solid var(--border-1);background:var(--surface-2);position:sticky;top:0;z-index:2;display:flex;padding-left:20px}
.tl-tick{font-family:var(--font-mono);font-size:10px;color:var(--text-3);width:100px;flex:none;border-left:1px solid var(--border-2);padding-left:4px;line-height:24px}
.tl-clips{height:80px;display:flex;margin-top:var(--sp-4);position:relative;padding-left:20px}
.tl-clip{height:100%;border-radius:var(--r-sm);border:1px solid var(--border-2);background:var(--surface-2);margin-right:1px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
.tl-clip:hover{border-color:var(--lime-a35)}
.tl-clip .thumb{position:absolute;inset:0;background:var(--surface-3);opacity:0.5}
.tl-clip .lbl{position:relative;z-index:1;font-size:10px;padding:2px 4px;background:rgba(0,0,0,0.5);color:var(--text-1);font-family:var(--font-mono)}
.tl-audio{height:64px;display:flex;margin-top:var(--sp-3);padding-left:20px}
.tl-audio-wave{height:100%;background:var(--surface-2);border-radius:var(--r-sm);border:1px solid var(--border-1);position:relative;overflow:hidden;flex:1;display:flex;align-items:center;gap:1px;padding:0 4px}
.tl-audio-wave i{flex:none;width:2px;background:var(--wave);border-radius:1px}
.tl-audio-wave i.played{background:var(--lime)}

.playhead{position:absolute;top:0;bottom:0;width:2px;background:var(--lime);left:240px;z-index:10;box-shadow:0 0 6px var(--lime-a35);pointer-events:none}
.playhead::before{content:"";position:absolute;top:0;left:-4px;width:10px;height:10px;background:var(--lime);border-radius:50%}
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="logo"><svg width="14" height="14" viewBox="0 0 14 14"><path d="M3.5 1.8 12 7l-8.5 5.2z" fill="#121600"/></svg></div>
    <button class="nav-btn" title="Setup"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 6h9M16 6h1M3 14h3M10 14h7"/><circle cx="13.5" cy="6" r="2"/><circle cx="7.5" cy="14" r="2"/></svg></button>
    <button class="nav-btn" title="Review"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5" y="4" width="12" height="13" rx="2.5"/><path d="M3 7v8a2.5 2.5 0 0 0 1.5 2.3" stroke-linecap="round"/></svg></button>
    <button class="nav-btn active" title="Timeline"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 5.5h14"/><rect x="3" y="9" width="8" height="3.5" rx="1.4"/><rect x="12.5" y="9" width="4.5" height="3.5" rx="1.4"/><path d="M3 16.5h14"/></svg></button>
    <button class="nav-btn" title="Export"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3v9m0 0 3.5-3.5M10 12 6.5 8.5"/><path d="M4 14.5V16a1.5 1.5 0 0 0 1.5 1.5h9A1.5 1.5 0 0 0 16 16v-1.5"/></svg></button>
    <div class="rail-spacer"></div>
    <div class="avatar">S</div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="proj">
        <span class="proj-name">Director's Flick</span>
        <span class="proj-meta">draft · 96 lines · 9:42 voiceover</span>
      </div>
      <div class="top-spacer"></div>
      <button class="account-chip">
        <span class="initial">N</span>
        <span class="name">NexGen Studio</span>
        <span class="cr">2,025.0 cr</span>
      </button>
    </header>

    <div class="workspace">
      <div class="preview-area">
        <div class="player-container">
          <div class="player-vid">
             <!-- Placeholder for video -->
             <svg viewBox="0 0 44 44" width="88" height="88" opacity="0.3"><rect x="12" y="14" width="20" height="16" rx="7" fill="#1C2530" stroke="rgba(255,255,255,.18)"/><path d="M22 14v-4" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/></svg>
          </div>
          <div class="player-controls">
            <button class="play-btn"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M4 2.5l8 4.5-8 4.5v-9z"/></svg></button>
            <span class="timecode">00:22.4 / 09:42.0</span>
          </div>
        </div>

        <div class="export-panel">
          <div>
            <div class="overline">Project Stats</div>
            <div class="stats-row"><span>Shots placed</span><span class="v">96 / 96</span></div>
            <div class="stats-row"><span>Total duration</span><span class="v">09:42.0</span></div>
            <div class="stats-row"><span>Credits used</span><span class="v">842.5 cr</span></div>
          </div>
          <div class="progress-container">
            <div style="display:flex;justify-content:space-between;font-size:var(--fs-12);color:var(--text-2);margin-bottom:8px;">
               <span>Exporting...</span><span class="mono" style="color:var(--lime)">45%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <button class="btn btn-secondary" style="width:100%; color:var(--danger)">Cancel export</button>
          </div>
        </div>
      </div>

      <div class="timeline-area">
        <div class="tl-tools">
          <button class="btn btn-secondary" style="height:32px; font-size:var(--fs-13)">
             <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
             Redo animation
          </button>
        </div>
        <div class="tl-track" id="track">
          <div class="tl-ruler">
             <div class="tl-tick">00:00</div>
             <div class="tl-tick">00:10</div>
             <div class="tl-tick">00:20</div>
             <div class="tl-tick">00:30</div>
             <div class="tl-tick">00:40</div>
          </div>
          <div class="playhead"></div>
          <div class="tl-clips">
             <div class="tl-clip" style="width:58px"><div class="thumb"></div><span class="lbl">L01</span></div>
             <div class="tl-clip" style="width:55px"><div class="thumb"></div><span class="lbl">L02</span></div>
             <div class="tl-clip" style="width:67px"><div class="thumb"></div><span class="lbl">L03</span></div>
             <div class="tl-clip" style="width:47px; border-color:var(--lime-a35)"><div class="thumb"></div><span class="lbl">L04</span></div>
             <div class="tl-clip" style="width:42px"><div class="thumb"></div><span class="lbl">L05</span></div>
             <div class="tl-clip" style="width:49px"><div class="thumb"></div><span class="lbl">L06</span></div>
          </div>
          <div class="tl-audio">
             <div class="tl-audio-wave" id="tl-wave"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  var el=document.getElementById('tl-wave'); if(!el)return;
  var s=42, r=function(){s=s*16807%2147483647;return s/2147483647;}, h=.45;
  for(var i=0;i<150;i++){
    h=Math.min(1,Math.max(.1,h+(r()-.5)*.5));
    var b=document.createElement('i'); 
    b.style.height=Math.round(h*100)+'%'; 
    if(i<108) b.className='played';
    el.appendChild(b);
  }
})();
</script>
</body>
</html>
