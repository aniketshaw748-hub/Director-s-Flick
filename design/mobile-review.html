<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Review — Director's Flick</title>
<style>
/* ============ TOKENS ============ */
:root{
  --bg-0:#0A0A0B; --bg-1:#0E0E10; --surface-1:#141416; --surface-2:#1A1A1D; --surface-3:#212125;
  --overlay:rgba(6,6,8,.72);
  --border-1:rgba(255,255,255,.07); --border-2:rgba(255,255,255,.12); --border-3:rgba(255,255,255,.18);
  --text-1:#F2F3EE; --text-2:#A5A8A0; --text-3:#6E716A; --text-disabled:#494B44;
  --lime:#C6FF4D; --lime-bright:#D7FF7B; --lime-deep:#A8E635; --lime-ink:#121600;
  --lime-a08:rgba(198,255,77,.08); --lime-a12:rgba(198,255,77,.12); --lime-a20:rgba(198,255,77,.20); --lime-a35:rgba(198,255,77,.35);
  --danger:#FF5C5C; --danger-a12:rgba(255,92,92,.12); --danger-a35:rgba(255,92,92,.35);
  --warn:#FFB454; --warn-a12:rgba(255,180,84,.12); --info:#8AB8F0;
  --font-sans:"Inter","Geist","Segoe UI Variable Display","Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
  --font-mono:"Geist Mono","JetBrains Mono","Cascadia Code","SF Mono",Consolas,"Roboto Mono",monospace;
  --fs-11:11px; --fs-12:12px; --fs-13:13px; --fs-14:14px; --fs-16:16px; --fs-18:18px; --fs-22:22px; --fs-28:28px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px; --sp-10:40px; --sp-12:48px;
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:20px; --r-2xl:24px; --r-full:999px;
  --shadow-1:0 1px 2px rgba(0,0,0,.4); --shadow-2:0 8px 24px rgba(0,0,0,.45); --shadow-3:0 24px 64px rgba(0,0,0,.6);
  --glow-lime:0 0 0 1px var(--lime-a20),0 0 24px rgba(198,255,77,.15);
  --glow-lime-strong:0 0 0 1px var(--lime-a35),0 0 40px rgba(198,255,77,.25);
  --t-fast:150ms; --t-med:200ms; --t-slow:250ms;
  --ease:cubic-bezier(.2,0,0,1); --ease-out:cubic-bezier(.16,1,.3,1);
}

/* ============ MOBILE BASE ============ */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg-0);color:var(--text-1);font:400 var(--fs-14)/1.5 var(--font-sans);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
button:active{opacity:0.8}
.mono{font-family:var(--font-mono)}
svg{display:block}

/* Topbar */
.topbar{height:56px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 var(--sp-4);background:var(--bg-1);border-bottom:1px solid var(--border-1)}
.top-title{font-size:var(--fs-14);font-weight:600}
.account-chip{display:flex;align-items:center;height:28px;padding:0 var(--sp-3);border-radius:var(--r-full);background:var(--surface-1);border:1px solid var(--border-1)}
.account-chip .cr{font-family:var(--font-mono);font-size:var(--fs-12);color:var(--lime)}

/* Main Swipe Area */
.card-stack{flex:1;position:relative;padding:var(--sp-4);display:flex;flex-direction:column;align-items:center;perspective:1000px}
.swipe-card{width:100%;max-width:420px;height:100%;background:var(--surface-1);border:1px solid var(--border-1);border-radius:var(--r-xl);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-2);position:absolute;will-change:transform}
.card-bg{transform:scale(0.95) translateY(16px);opacity:0.6;z-index:1;border-color:var(--border-2)}
.card-fg{z-index:2;transform:scale(1) translateY(0);transition:transform var(--t-med) var(--ease-out)}
.card-image{flex:1;background:var(--surface-2);position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-image::after{content:"";position:absolute;inset:0;background:var(--scrim);pointer-events:none;opacity:0}
.card-content{padding:var(--sp-5);display:flex;flex-direction:column;gap:var(--sp-3);border-top:1px solid var(--border-1);background:var(--surface-1)}
.card-line{font-size:var(--fs-16);font-weight:500;line-height:1.4;color:var(--text-1)}
.card-prompt{font-size:var(--fs-13);color:var(--text-3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.at-chip{display:inline-flex;align-items:center;height:20px;padding:0 6px;border-radius:var(--r-full);background:var(--lime-a12);border:1px solid var(--lime-a20);color:var(--lime);font-family:var(--font-mono);font-size:var(--fs-11);margin:0 2px;vertical-align:middle}

/* Actions */
.actions{padding:var(--sp-4);display:flex;justify-content:center;gap:var(--sp-6);padding-bottom:calc(var(--sp-4) + env(safe-area-inset-bottom));flex:none}
.btn-circle{width:64px;height:64px;border-radius:var(--r-full);display:grid;place-items:center;box-shadow:var(--shadow-2);border:1px solid var(--border-1);background:var(--surface-2);transition:transform var(--t-fast) var(--ease)}
.btn-circle:active{transform:scale(0.92)}
.btn-reject{color:var(--danger);border-color:var(--danger-a35)}
.btn-approve{background:var(--lime);color:var(--lime-ink);box-shadow:var(--glow-lime);border:none}

/* Bottom Sheet */
.sheet-backdrop{position:fixed;inset:0;background:var(--overlay);z-index:10;opacity:0;pointer-events:none;transition:opacity var(--t-slow) var(--ease-out)}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface-1);border-top:1px solid var(--border-2);border-radius:var(--r-2xl) var(--r-2xl) 0 0;padding:var(--sp-5);padding-bottom:calc(var(--sp-5) + env(safe-area-inset-bottom));z-index:11;transform:translateY(100%);transition:transform var(--t-slow) var(--ease-out);display:flex;flex-direction:column;gap:var(--sp-4)}
.sheet.active{transform:translateY(0)}
.sheet-backdrop.active{opacity:1;pointer-events:auto}
.sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--surface-3);margin:0 auto;margin-bottom:var(--sp-2)}
.sheet-title{font-size:var(--fs-18);font-weight:600;letter-spacing:-.01em;text-align:center;margin-bottom:var(--sp-2)}
.btn-row{display:flex;align-items:center;justify-content:flex-start;gap:var(--sp-3);height:56px;padding:0 var(--sp-4);border-radius:var(--r-md);background:var(--surface-2);border:1px solid var(--border-1);font-weight:500;font-size:var(--fs-14)}
.btn-row:active{background:var(--surface-3)}
</style>
</head>
<body>
  <header class="topbar">
    <button style="width:32px;color:var(--text-2)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="top-title">Review · L04 / 96</div>
    <div class="account-chip"><span class="cr">2,025 cr</span></div>
  </header>
  
  <div class="card-stack">
    <div class="swipe-card card-bg"></div>
    <div class="swipe-card card-fg" id="front-card">
      <div class="card-image">
        <!-- Rendered Image Placeholder -->
        <svg viewBox="0 0 44 44" width="88" height="88"><rect x="12" y="14" width="20" height="16" rx="7" fill="#1C2530" stroke="rgba(255,255,255,.18)"/><circle cx="19" cy="22" r="2.4" fill="#C6FF4D"/><circle cx="25" cy="22" r="2.4" fill="#C6FF4D"/><path d="M22 14v-4" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/><circle cx="22" cy="8" r="1.8" fill="#C6FF4D" opacity=".8"/></svg>
      </div>
      <div class="card-content">
        <div class="card-line">The door at the base of the tower hung open on one hinge.</div>
        <div class="card-prompt">Cinematic 16:9 still frame depicting: The door at the base of the tower hung open on one hinge. Featuring <span class="at-chip">@Lighthouse-room</span>. Painterly cinematic realism. Muted teal shadows, warm amber key light...</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-circle btn-reject" onclick="document.querySelector('.sheet').classList.add('active'); document.querySelector('.sheet-backdrop').classList.add('active');">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <button class="btn-circle btn-approve" onclick="document.getElementById('front-card').style.transform='translateX(120%) rotate(10deg)'; document.getElementById('front-card').style.opacity='0'; setTimeout(()=>document.getElementById('front-card').style.display='none', 250)">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
    </button>
  </div>

  <div class="sheet-backdrop" onclick="document.querySelector('.sheet').classList.remove('active'); document.querySelector('.sheet-backdrop').classList.remove('active');"></div>
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Reject image</div>
    <button class="btn-row">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Edit with instructions
    </button>
    <button class="btn-row">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      Redo (generate fresh prompt)
    </button>
  </div>
</body>
</html>
